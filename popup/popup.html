<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalGo</title>
  <link rel="stylesheet" href="../styles/tailwind.min.css" />
  <style>
    body { min-width: 320px; max-width: 360px; }
    .shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body class="bg-white p-4 font-sans">

  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-lg font-semibold text-gray-800">Create a new go link</h1>
    <button id="open-dashboard" title="Open dashboard"
            class="text-gray-400 hover:text-gray-600 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
    </button>
  </div>

  <!-- Server not running warning -->
  <div id="server-warning"
       class="hidden bg-amber-50 border border-amber-300 rounded-md p-3 mb-3 text-sm">
    <p class="text-amber-800 font-medium">Server not running</p>
    <p class="text-amber-700 text-xs mt-0.5">Start it with: <code class="font-mono bg-amber-100 px-1 rounded">node server/server.js</code></p>
  </div>

  <!-- Conflict warning -->
  <div id="conflict-banner"
       class="hidden bg-red-50 border border-red-300 rounded-md p-3 mb-3 text-sm">
    <p class="text-red-700 font-medium mb-1">
      <span class="font-mono">go/<span id="conflict-path-label"></span></span> already exists.
    </p>
    <div class="flex gap-2">
      <button id="overwrite-btn"
              class="px-3 py-1 bg-red-600 text-white rounded text-xs hover:bg-red-700 transition-colors">
        Overwrite
      </button>
      <button id="cancel-overwrite-btn"
              class="px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs hover:bg-gray-300 transition-colors">
        Cancel
      </button>
    </div>
  </div>

  <!-- Short path input -->
  <div class="flex items-center gap-2 mb-3">
    <span class="text-gray-500 font-mono text-sm font-medium">go/</span>
    <input id="keyword-input"
           type="text"
           placeholder="keyword"
           autocomplete="off"
           class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-mono" />
  </div>

  <!-- Destination URL -->
  <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">
    Destination
  </label>
  <input id="url-input"
         type="text"
         placeholder="https://..."
         class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-mono" />

  <!-- Tags -->
  <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-1">
    Tags <span class="font-normal normal-case text-gray-400">(comma separated)</span>
  </label>
  <input id="tags-input"
         type="text"
         placeholder="work, google, tools"
         class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />

  <!-- AI suggestions strip -->
  <div id="ai-strip" class="hidden bg-indigo-50 border border-indigo-200 rounded-md px-3 py-2 mb-3 text-xs">
    <div id="ai-loading" class="hidden flex items-center gap-1.5 text-indigo-500">
      <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
      <span>AI analyzing page…</span>
    </div>
    <div id="ai-result" class="hidden">
      <div class="flex items-center gap-1 mb-1.5 text-indigo-600 font-medium">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        AI suggests:
      </div>
      <div class="flex flex-wrap items-center gap-1.5">
        <button id="ai-keyword-btn"
                class="font-mono bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded hover:bg-indigo-200 transition-colors border border-indigo-300"
                title="Click to use suggested keyword"></button>
        <span class="text-gray-400">|</span>
        <span id="ai-tags-container" class="flex gap-1 flex-wrap"></span>
      </div>
    </div>
  </div>

  <!-- Create button -->
  <div class="flex justify-end">
    <button id="create-btn"
            class="px-5 py-2 bg-indigo-600 text-white rounded-md text-sm font-medium hover:bg-indigo-700 active:bg-indigo-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
      Create
    </button>
  </div>

  <!-- Toast notification -->
  <div id="toast"
       class="hidden fixed bottom-3 left-1/2 -translate-x-1/2 bg-green-600 text-white px-4 py-2 rounded-full text-sm font-medium shadow-lg">
    ✓ Saved!
  </div>

  <script src="popup.js"></script>
</body>
</html>
